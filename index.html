<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusursuz Fiyasko Çokluevreni</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>

    <div class="container" id="entryScreen">
        <div class="top-controls">
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLang('tr')">TR</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
                <button class="lang-btn" onclick="setLang('fr')">FR</button>
                <button class="lang-btn" onclick="setLang('it')">IT</button>
                <button class="lang-btn" onclick="setLang('es')">ES</button>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" id="btn-mode-interview" onclick="setMode('interview')">👔 MÜLAKAT</button>
                <button class="mode-btn" id="btn-mode-redflag" onclick="setMode('redflag')">💔 FLÖRT</button>
                <button class="mode-btn" id="btn-mode-timetravel" onclick="setMode('timetravel')">⏳ ZAMAN YOLCUSU</button>
                <button class="mode-btn" id="btn-mode-influencer" onclick="setMode('influencer')">📱 FENOMEN</button>
                <button class="mode-btn" id="btn-mode-agent" onclick="setMode('agent')">💣 AJAN</button>
                <button class="mode-btn" id="btn-mode-family" onclick="setMode('family')">🧿 AİLE YEMEĞİ</button>
            </div>
        </div>

        <div class="header">
            <h1 id="ui-title">[ BAŞVURU FORMU ]</h1>
        </div>
        <div class="input-group">
            <label id="ui-name-label">Oyuncunun Adı:</label>
            <input type="text" id="candidateName" placeholder="..." autocomplete="off">
        </div>
        
        <div>
            <label class="avatar-section-label" id="ui-avatar-label">Karakterin:</label>
            <div class="avatar-grid" id="avatarGrid"></div>
        </div>

        <button class="start-btn" onclick="startGame()" id="ui-start-btn">[ SİMÜLASYONU BAŞLAT ]</button>
    </div>

    <div class="container" id="questionScreen">
        <div class="status-bar">
            <div id="candidateDisplay">Bekleniyor</div>
            <div class="lives" id="livesDisplay"></div>
        </div>
        <div class="question-text" id="questionText">Yükleniyor...</div>
        <div class="options-grid" id="optionsGrid"></div>
    </div>

    <div class="container" id="gameOverScreen" style="text-align: center;">
        <div class="header">
            <h1 id="ui-gameover-title">[ OYUN BİTTİ ]</h1>
            <p id="ui-gameover-msg">Mesaj.</p>
        </div>
        <h2 style="font-size: 40px; margin: 20px 0;">Skor: <span id="finalScoreDisplay">0</span></h2>
        
        <button class="start-btn" onclick="shareScore()" id="ui-btn-share" style="background-color: var(--text-color); color: var(--form-bg); margin-bottom: 15px;">[ PAYLAŞ ]</button>
        <button class="start-btn" onclick="showLeaderboard()" id="ui-btn-leaderboard">[ TABLOYU GÖR ]</button>
    </div>

    <div class="container" id="leaderboardScreen">
        <div class="header">
            <h1 id="ui-leaderboard-title">[ LİDERLİK TABLOSU ]</h1>
        </div>
        <ul id="leaderboardList"></ul>
        <button class="start-btn" onclick="location.reload()" id="ui-btn-restart">[ YENİDEN DENE ]</button>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
