        .mute-btn { position: absolute; top: 20px; right: 20px; font-size: 20px; background: var(--form-bg); border: 2px solid var(--border-color); padding: 5px 10px; cursor: pointer; z-index: 1000; transition: all 0.2s;}
        .mute-btn:hover { background: var(--text-color); color: var(--form-bg); }

        .top-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;}
        .lang-selector { display: flex; gap: 5px; margin: 0 auto;}
        .lang-btn { font-family: 'Courier Prime', monospace; background: transparent; border: 1px solid var(--border-color); padding: 5px 10px; cursor: pointer; transition: all 0.2s; font-size: 12px;}
        .lang-btn:hover, .lang-btn.active { background: var(--text-color); color: var(--form-bg); }

        .mode-selector { display: flex; gap: 10px; width: 100%; flex-wrap: wrap; justify-content: center;}
        .mode-btn { flex: 1; padding: 10px; min-width: 140px; font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: bold; background: transparent; border: 2px solid var(--border-color); cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: var(--text-color); color: var(--form-bg); transform: scale(1.05); }

        .header h1 { font-size: 24px; text-align: center; letter-spacing: 2px; border-bottom: 2px dashed var(--border-color); padding-bottom: 20px; margin-top: 0; margin-bottom: 30px; }
        .input-group { margin-bottom: 30px; }
        .input-group label { font-weight: bold; display: block; margin-bottom: 10px; }
        .input-group input { width: 100%; border: none; border-bottom: 2px solid var(--border-color); font-family: 'Courier Prime', monospace; font-size: 18px; padding: 5px 0; outline: none; }
        
        .avatar-section-label { font-weight: bold; margin-bottom: 10px; display: block; }
        .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        
        .avatar-option { border: 2px solid var(--border-color); padding: 5px; text-align: center; cursor: pointer; filter: grayscale(100%) contrast(200%); transition: all 0.2s; background-color: #fff;}
        .avatar-option:hover { background-color: #eee; transform: scale(1.05); }
        .avatar-option.selected { background-color: var(--text-color); border-color: var(--text-color); filter: none; transform: scale(1.1); box-shadow: 4px 4px 0px rgba(0,0,0,0.2); }
        .avatar-option img { width: 100%; height: auto; display: block; }
        
        .start-btn { width: 100%; padding: 15px; font-family: 'Courier Prime', monospace; font-size: 18px; font-weight: bold; background-color: transparent; border: 3px solid var(--border-color); cursor: pointer; margin-top: 15px;}
        .start-btn:hover { background-color: var(--text-color); color: var(--form-bg); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #questionScreen, #gameOverScreen, #leaderboardScreen { display: none; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--border-color); padding-bottom: 15px; margin-bottom: 25px; font-weight: bold; }
        .lives { display: flex; gap: 5px; font-size: 24px; filter: grayscale(100%) contrast(200%); }
        .lives span { transition: opacity 0.3s ease; }
        .lives span.lost { opacity: 0.2; text-decoration: line-through; }
        .question-text { font-size: 18px; line-height: 1.6; margin-bottom: 30px; }
        .options-grid { display: flex; flex-direction: column; gap: 15px; }
        .option-btn { text-align: left; padding: 15px; font-family: 'Courier Prime', monospace; font-size: 15px; background-color: transparent; border: 2px solid var(--border-color); cursor: pointer; transition: all 0.2s ease; line-height: 1.4; }
        .option-btn:hover { background-color: #eee; transform: translateX(5px); }

        #leaderboardList { list-style: none; padding: 0; margin-bottom: 30px; }
        #leaderboardList li { padding: 10px 0; border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between; font-size: 16px; align-items: center;}

        @media (max-width: 480px) { .avatar-grid { grid-template-columns: repeat(4, 1fr); } }

        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }
        document.addEventListener('click', initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        function playTone(freq, type, duration, vol=0.1) {
            if (isMuted) return; // Mute aktifse sesi çalma
            try {
                if (!audioCtx) initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

            secilenAvatar = null; 
            
            let currentAvatarList = interviewAvatars;
            if (currentMode === 'redflag') currentAvatarList = redflagAvatars;
            if (currentMode === 'timetravel') currentAvatarList = timetravelAvatars;
            
            currentAvatarList.forEach(url => {
                let div = document.createElement('div');
                div.className = 'avatar-option';
                div.setAttribute('data-id', url); 
                
                let img = document.createElement('img');
                img.src = url;
                
                div.appendChild(img);
                div.onclick = function() { selectAvatar(this); };
                grid.appendChild(div);
            });
        }

        function updateUI() {
            const ui = gameData[currentLang][currentMode];
            document.getElementById('ui-title').innerText = ui.title;
            document.getElementById('ui-name-label').innerText = ui.nameLabel;
            document.getElementById('ui-avatar-label').innerText = ui.avatarLabel;
            document.getElementById('ui-start-btn').innerText = ui.startBtn;
            document.getElementById('ui-gameover-title').innerText = ui.gameOverTitle;
            document.getElementById('ui-gameover-msg').innerText = ui.gameOverMsg;
            document.getElementById('ui-btn-leaderboard').innerText = ui.btnLeaderboard;
            document.getElementById('ui-leaderboard-title').innerText = ui.leaderboardTitle;
            document.getElementById('ui-btn-restart').innerText = ui.btnRestart;
            document.getElementById('ui-btn-share').innerText = ui.btnShare;
        }

        function setLang(langCode) {
            playClick();
            currentLang = langCode;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === langCode) btn.classList.add('active');
            });
            updateUI();
        }

        function setMode(mode) {
            playClick();
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-mode-${mode}`).classList.add('active');
            updateUI();
            renderAvatars(); 
        }

        function shuffleArray(array) {
            let copy = [...array];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function selectAvatar(element) {
            playSelect();
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            secilenAvatar = element.getAttribute('data-id');
        }

        async function startGame() {
            playClick();
            let isim = document.getElementById('candidateName').value;
            if (isim.trim() === "" || !secilenAvatar) { alert(gameData[currentLang][currentMode].alertMissing); return; }

            const startBtn = document.getElementById('ui-start-btn');
            startBtn.innerText = "[ BAĞLANILIYOR... ]";
            startBtn.disabled = true;

            try {
                const dbName = modes[currentMode].dbQuestions;
                const qSnapshot = await getDocs(collection(db, dbName));
                let fetchedQuestions = [];
                
                qSnapshot.forEach((doc) => {
                    let data = doc.data();
                    if(data[currentLang]) fetchedQuestions.push(data[currentLang]);
                    else if(data['en']) fetchedQuestions.push(data['en']); 
                    else if(data['tr']) fetchedQuestions.push(data['tr']);
                });

                if(fetchedQuestions.length === 0) {
                    alert("Sistemde hiç soru bulunamadı!");
                    startBtn.disabled = false;
                    updateUI();
                    return;
                }

                activeQuestions = shuffleArray(fetchedQuestions);
                currentPlayer.isim = isim;
                currentPlayer.avatar = secilenAvatar;
                currentPlayer.puan = 0;
                currentPlayer.can = 3;
                currentQuestionIndex = 0;

                document.getElementById('entryScreen').style.display = 'none';
                document.getElementById('questionScreen').style.display = 'block';
                document.getElementById('candidateDisplay').innerText = gameData[currentLang][currentMode].candidatePrefix + currentPlayer.isim;
                
                updateLives();
                loadQuestion();

            } catch (error) {
                alert("Sunucuya ulaşılamıyor.");
                startBtn.disabled = false;
                updateUI();
            }
        }

        function updateLives() {
            const livesDiv = document.getElementById('livesDisplay');
            livesDiv.innerHTML = ""; 
            const icon = modes[currentMode].icon; 
            for (let i = 0; i < 3; i++) {
                let tie = document.createElement('span'); tie.innerText = icon;
                if (i >= currentPlayer.can) tie.classList.add('lost');
                livesDiv.appendChild(tie);
            }
        }

        function loadQuestion() {
            if (currentQuestionIndex >= activeQuestions.length) { triggerGameOver(); return; }
            const q = activeQuestions[currentQuestionIndex];
            const soruMetni = q.question || q.text; 
            
            document.getElementById('questionText').innerText = gameData[currentLang][currentMode].questionPrefix + (currentQuestionIndex + 1) + ":\n\n" + soruMetni;
            
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = ""; 

            let shuffledOptions = shuffleArray(q.options);
            const letters = ["A", "B", "C"];
            shuffledOptions.forEach((option, index) => {
                let btn = document.createElement('button');
                btn.classList.add('option-btn');
                let cleanText = option.text.replace(/^\[ [A-C] \] /, "");
                btn.innerText = "[ " + letters[index] + " ] " + cleanText;
                btn.onclick = () => handleAnswer(option.points);
                optionsGrid.appendChild(btn);
            });
        }

        function handleAnswer(points) {
            playSelect();
            currentPlayer.puan += points;
            
            if (points === 0) {
                playWrong();
                currentPlayer.can--;
                updateLives();
                const questionContainer = document.getElementById('questionScreen');
                questionContainer.classList.add('shake-effect');
                setTimeout(() => questionContainer.classList.remove('shake-effect'), 400);

                if (currentPlayer.can <= 0) { setTimeout(() => triggerGameOver(), 500); return; }
            }
            currentQuestionIndex++;
            setTimeout(() => loadQuestion(), points === 0 ? 600 : 200); 
        }

        async function triggerGameOver() {
            playGameOver();
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScoreDisplay').innerText = currentPlayer.puan;

            try {
                const dbLeaderboard = modes[currentMode].dbLeaderboard;
                await addDoc(collection(db, dbLeaderboard), {
                    name: currentPlayer.isim,
                    avatar: currentPlayer.avatar,
                    score: currentPlayer.puan,
                    timestamp: serverTimestamp() 
                });
            } catch (error) { console.error("Skor kaydedilemedi:", error); }
        }

        function showLeaderboard() {
            playClick();
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'block';
            const list = document.getElementById('leaderboardList');
            
            try {
                const dbLeaderboard = modes[currentMode].dbLeaderboard;
                const q = query(collection(db, dbLeaderboard), orderBy("score", "desc"), limit(10));
                getDocs(q).then(querySnapshot => {
                    list.innerHTML = ""; 
                    let rank = 1;
                    querySnapshot.forEach((doc) => {
                        let data = doc.data();
                        let li = document.createElement('li');
                        
                        let avatarUrl = data.avatar.includes('http') ? data.avatar : `https://api.dicebear.com/9.x/adventurer/svg?seed=${data.avatar}`;
                        let avatarImg = `<img src="${avatarUrl}" style="width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-right: 10px; background-color: white; border: 1px solid var(--border-color);">`;
                        
                        li.innerHTML = `<span style="display:flex; align-items:center;"><b>${rank}.</b> <span style="margin-left: 5px;">${avatarImg}</span> ${data.name}</span> <span><b>${data.score}</b> Puan</span>`;
                        list.appendChild(li);
                        rank++;
                    });
                    if (querySnapshot.empty) list.innerHTML = "<li>Henüz kimse rezil olmadı. İlk sen ol!</li>";
                });
            } catch (error) {
                list.innerHTML = "<li>Sistem hatası. Tabloya ulaşılamıyor.</li>";
            }
        }

        function shareScore() {
            playClick();
            const textToShare = gameData[currentLang][currentMode].shareText.replace('{score}', currentPlayer.puan);
            const urlToShare = window.location.href; 

            if (navigator.share) {
                navigator.share({ title: 'Kusursuz Fiyasko', text: textToShare, url: urlToShare })
                .catch((error) => console.log('Paylaşım iptal edildi', error));
            } else {
                const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(textToShare)}&url=${encodeURIComponent(urlToShare)}`;
                window.open(twitterUrl, '_blank');
            }
        }

        // Window atamaları
        window.setLang = setLang;
        window.setMode = setMode;
        window.selectAvatar = selectAvatar;
        window.startGame = startGame;
        window.showLeaderboard = showLeaderboard;
        window.shareScore = shareScore;
        window.toggleMute = toggleMute; // Mute fonksiyonu window'a eklendi

        document.addEventListener('DOMContentLoaded', () => { renderAvatars(); updateUI(); });
    </script>
</body>
</html>
